<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Spider</title>
    <link rel="stylesheet" href="matrix.css">
</head>
<body>
    <div class="app-container">

        <!-- Custom Titlebar (drag region) -->
        <div class="custom-titlebar" data-tauri-drag-region>
            <div class="titlebar-text">Train Spider</div>
            <div class="titlebar-controls">
                <button class="titlebar-btn minimize-btn" id="titlebar-minimize">─</button>
                <button class="titlebar-btn maximize-btn" id="titlebar-maximize">□</button>
                <button class="titlebar-btn close-btn" id="titlebar-close">✕</button>
            </div>
        </div>

        <!-- ======= Server Rail ======= -->
        <aside class="servers-sidebar">
            <div class="sidebar-top">
                <div class="server-icon active" title="Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                <div class="divider"></div>
                <div class="server-icon" title="Matrix HQ">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                </div>
                <div class="server-icon" title="Nixos">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
                    <span class="notification-badge">3</span>
                </div>
                <div class="server-icon" title="Dev Server">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                </div>
                <div class="server-icon plus-icon" title="Add Server">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="server-icon settings-icon" title="Settings">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </div>
            </div>
        </aside>

        <!-- ======= Rooms Sidebar ======= -->
        <nav class="rooms-sidebar">
            <header class="sidebar-header">
                <div class="header-content">
                    <h1>Train Spider</h1>
                    <svg class="chevron-down" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
            </header>

            <div class="rooms-list">
                <div class="search-bar-trigger">
                    <span>Find or start a conversation</span>
                    <span class="kbd">⌘K</span>
                </div>

                <details open>
                    <summary>Rooms</summary>
                    <ul id="rooms-list-container"></ul>
                </details>

                <details open>
                    <summary>Direct Messages</summary>
                    <ul>
                        <li class="room-item">
                            <div class="status-indicator online"></div>
                            Joe
                        </li>
                    </ul>
                </details>
            </div>

            <footer class="user-profile">
                <div class="user-avatar">U</div>
                <div class="user-info">
                    <span class="display-name">User</span>
                    <span class="status-text">Online</span>
                </div>
                <div class="user-actions">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
            </footer>
        </nav>

        <!-- ======= Main Chat ======= -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="room-info">
                    <span class="room-hash">#</span>
                    <h2 id="active-room-name">general</h2>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" title="Members"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
                    <button class="icon-btn" title="Search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
                    <button class="icon-btn" title="Inbox"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></button>
                </div>
            </header>

            <div class="messages-container" id="messages-container"></div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <button class="action-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    </button>
                    <input type="text" id="message-input" placeholder="Message #general" autocomplete="off">
                    <div style="display: flex; gap: 4px;">
                        <button class="action-btn gif-btn">GIF</button>
                        <button class="action-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                        </button>
                    </div>
                </div>
            </footer>
        </main>

        <!-- ======= Command Palette ======= -->
        <div id="command-palette" class="overlay hidden">
            <div class="palette-container">
                <div class="palette-search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="Where would you like to go?">
                </div>
                <div class="palette-results">
                    <div class="palette-group">Rooms</div>
                    <div class="palette-item"># general</div>
                    <div class="palette-item"># dev</div>
                    <div class="palette-item"># design</div>
                    <div class="palette-group">Actions</div>
                    <div class="palette-item">Create new room</div>
                    <div class="palette-item">Invite people</div>
                </div>
                <div class="palette-footer">
                    <span class="kbd">ESC</span> to close
                </div>
            </div>
        </div>

        <!-- ======= Matrix Login Modal ======= -->
        <div id="matrix-login-modal" class="overlay hidden">
            <div class="palette-container" style="padding: 24px;">
                <h3 style="margin-top: 0; color: white;">Matrix Login</h3>
                <div class="palette-search" style="margin-bottom: 12px; padding: 0;">
                    <input type="text" id="matrix-homeserver" placeholder="Homeserver (e.g. https://matrix.org)" value="https://matrix.org" style="width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px;">
                </div>
                <div class="palette-search" style="margin-bottom: 12px; padding: 0;">
                    <input type="text" id="matrix-username" placeholder="Username" style="width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px;">
                </div>
                <div class="palette-search" style="margin-bottom: 16px; padding: 0;">
                    <input type="password" id="matrix-password" placeholder="Password" style="width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px;">
                </div>
                <button id="matrix-login-btn" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #5865f2, #7983f5); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Login to Matrix</button>
                <div id="matrix-login-status" style="margin-top: 12px; color: #ff6b6b; font-size: 14px; text-align: center;"></div>
                <div class="palette-footer" style="margin-top: 16px; text-align: center; border-top: none;">
                    <span class="kbd">ESC</span> to close or <span class="kbd" id="matrix-skip-btn" style="cursor: pointer;">Skip</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/matrix_logic.js"></script>
</body>
</html>
